name: Package installers

# Builds the desktop host installers (#32) and uploads them as downloadable
# artifacts. UNSIGNED for now — macOS signing is skipped (CSC_IDENTITY_AUTO_
# DISCOVERY=false); Windows/Linux are unsigned by default.
#
# Triggers: manual (workflow_dispatch) or pushing a release tag (e.g. v2.0.0).
# Installers build on demand / per release, not on every push to main.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true # real icon binaries (*.ico/*.png) + image assets, not LFS pointers

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # macOS only: if the signing secrets are configured, decode the App Store
      # Connect API key to a file and export the signing env so electron-builder
      # signs (Developer ID via CSC_LINK) + notarizes (notarytool via the API
      # key). With no secrets it stays unsigned — so forks and pre-setup builds
      # still work. See docs/SIGNING.md for the secret setup.
      - name: Prepare macOS signing
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$CSC_LINK" ] && [ -n "$APPLE_API_KEY_B64" ]; then
            echo "$APPLE_API_KEY_B64" | base64 --decode > "$RUNNER_TEMP/apple_api_key.p8"
            {
              echo "APPLE_API_KEY=$RUNNER_TEMP/apple_api_key.p8"
              echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
              echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
              echo "CSC_LINK=$CSC_LINK"
              echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD"
              echo "FD_SIGN_MAC=1"
            } >> "$GITHUB_ENV"
            echo "macOS signing + notarization enabled."
          else
            echo "No macOS signing secrets — building unsigned."
          fi

      # Windows only: enable Azure Trusted Signing when its secrets are set.
      # electron-builder signs via win.azureSignOptions (injected as -c.*
      # config overrides) using AZURE_* service-principal auth. No secrets →
      # unsigned. See docs/SIGNING.md for the secret + Azure setup.
      - name: Prepare Windows signing
        if: runner.os == 'Windows'
        shell: bash
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZ_ENDPOINT: ${{ secrets.AZURE_TS_ENDPOINT }}
          AZ_ACCOUNT: ${{ secrets.AZURE_TS_ACCOUNT }}
          AZ_PROFILE: ${{ secrets.AZURE_TS_PROFILE }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZ_ENDPOINT" ]; then
            {
              echo "AZURE_TENANT_ID=$AZURE_TENANT_ID"
              echo "AZURE_CLIENT_ID=$AZURE_CLIENT_ID"
              echo "AZURE_CLIENT_SECRET=$AZURE_CLIENT_SECRET"
              echo "FD_WIN_SIGN_ARGS=-c.win.azureSignOptions.endpoint=$AZ_ENDPOINT -c.win.azureSignOptions.codeSigningAccountName=$AZ_ACCOUNT -c.win.azureSignOptions.certificateProfileName=$AZ_PROFILE"
            } >> "$GITHUB_ENV"
            echo "Windows Azure Trusted Signing enabled."
          else
            echo "No Windows signing secrets — building unsigned."
          fi

      - name: Build installer
        env:
          # macOS signs only when its secrets were prepared above; Windows signs
          # via the injected Azure args (FD_WIN_SIGN_ARGS). No secrets on either
          # → unsigned (Linux is always unsigned for now).
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.FD_SIGN_MAC == '1' && 'true' || 'false' }}
        run: npm run dist -- --publish never ${{ env.FD_WIN_SIGN_ARGS }}

      - name: Upload installers
        uses: actions/upload-artifact@v5
        with:
          name: installer-${{ matrix.os }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
